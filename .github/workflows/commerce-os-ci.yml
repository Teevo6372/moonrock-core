name: Commerce OS CI

on:
  pull_request:
    paths:
      - "apps/commerce-os/**"
      - ".github/workflows/commerce-os-ci.yml"
  push:
    branches: [main]
    paths:
      - "apps/commerce-os/**"
      - ".github/workflows/commerce-os-ci.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/commerce-os
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install --ignore-scripts
      - run: cp .env.example .env
      - run: npm run db:generate
      - run: npm run check
