name: Commerce OS CI

on:
  pull_request:
    paths:
      - "apps/commerce-os/**"
      - ".github/workflows/commerce-os-ci.yml"
  push:
    branches: [main]
    paths:
      - "apps/commerce-os/**"
      - ".github/workflows/commerce-os-ci.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/commerce-os
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: npm install --ignore-scripts
      - name: Configure environment
        run: cp .env.example .env
      - name: Generate Prisma client
        run: npm run db:generate
      - name: Lint
        run: npm run lint
      - name: Check formatting
        run: npm run format
      - name: Type-check
        run: npm run typecheck
      - name: Run tests
        run: npm run test
      - name: Validate schema
        run: npm run db:validate
      - name: Build
        run: npm run build
